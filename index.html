<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eli's Eggs</title>

<style>
:root {
  --bg: #f4efe6;
  --card: #fffaf2;
  --accent: #6b8e23;
  --brown: #7a4f2b;
  --text: #2a2a2a;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Georgia, serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

nav {
  position: fixed;
  width: 100%;
  background: rgba(244,239,230,0.9);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

nav h1 { color: var(--brown); }

section {
  padding: 90px 20px;
  max-width: 1100px;
  margin: auto;
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero h2 {
  font-size: 50px;
  color: var(--brown);
}

.btn {
  background: var(--accent);
  color: white;
  padding: 12px;
  border: none;
  cursor: pointer;
  margin-top: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

form label {
  margin-top: 10px;
  display: block;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
}

footer {
  text-align: center;
  padding: 30px;
}
</style>
</head>

<body>

<nav>
  <h1>Eli's Eggs 🐔</h1>
</nav>

<section class="hero">
  <h2>Farm Fresh Eggs</h2>
  <p>Locally raised. Naturally better.</p>
  <button class="btn" onclick="scrollToSection('order')">Order Now</button>
</section>

<section>
  <h2>Our Farm</h2>
  <div class="grid gallery" style="margin-top:20px;">
    <img src="egg1.jpg">
    <img src="egg2.jpg">
    <img src="egg3.jpg">
  </div>
</section>

<section>
  <h2>Egg Options</h2>
  <div class="grid" style="margin-top:20px;">
    <div class="card">
      <h3>Dozen</h3>
      <p>$4</p>
    </div>
    <div class="card">
      <h3>Half Dozen</h3>
      <p>$2.50</p>
    </div>
  </div>
</section>

<section id="order">
  <h2>Place an Order</h2>

  <form id="orderForm">

    <label>Name</label>
    <input type="text" id="name" required>

    <label>Contact (Phone or Discord)</label>
    <input type="text" id="contact" required>

    <label>Order Type</label>
    <select id="type">
      <option>Dozen</option>
      <option>Half Dozen</option>
    </select>

    <label>Quantity</label>
    <input type="number" id="quantity" min="1" required>

    <label>Pickup Date</label>
    <input type="date" id="date" required>

    <label>Pickup Time</label>
    <input type="time" id="time" required>

    <label>Special Requests</label>
    <textarea id="notes"></textarea>

    <button class="btn">Submit Order</button>
  </form>

  <p id="formMessage"></p>
</section>

<footer>
  🥚 Eli's Eggs — Fresh Every Day
</footer>

<script>
const webhookURL = "YOUR_WEBHOOK_HERE";

// Scroll
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

// Form → Discord EMBED
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    embeds: [{
      title: "🥚 New Egg Order",
      color: 5814783,
      fields: [
        { name: "Name", value: document.getElementById("name").value, inline: true },
        { name: "Contact", value: document.getElementById("contact").value, inline: true },
        { name: "Order Type", value: document.getElementById("type").value, inline: true },
        { name: "Quantity", value: document.getElementById("quantity").value, inline: true },
        { name: "Pickup Date", value: document.getElementById("date").value, inline: true },
        { name: "Pickup Time", value: document.getElementById("time").value, inline: true },
        { name: "Notes", value: document.getElementById("notes").value || "None" }
      ],
      footer: {
        text: "Eli's Eggs Order System"
      },
      timestamp: new Date()
    }]
  };

  fetch(webhookURL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("formMessage").textContent = "Order sent!";
    document.getElementById("orderForm").reset();
  })
  .catch(() => {
    document.getElementById("formMessage").textContent = "Error sending order.";
  });
});
</script>

</body>
</html>
