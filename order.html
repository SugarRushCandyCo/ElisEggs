<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<title>Order</title>
</head>
<body>

<nav>
  <h2>Eli's Eggs 🥚</h2>
</nav>

<section>

  <div style="background:white; padding:30px; border-radius:10px;">
    <h2>Order Eggs</h2>

    <form id="orderForm">

      <input id="name" placeholder="Name" required><br><br>
      <input id="contact" placeholder="Phone Number" required><br><br>

      <select id="type">
        <option>Dozen</option>
        <option>Half Dozen</option>
      </select><br><br>

      <input id="quantity" type="number" value="1"><br><br>

      <input id="date" type="date"><br><br>
      <input id="time" type="time"><br><br>

      <textarea id="notes" placeholder="Notes"></textarea><br><br>

      <button type="submit">Submit Order</button>

    </form>

    <p id="status"></p>

  </div>

</section>

<script>
const webhookURL = "PASTE YOUR WEBHOOK HERE";

document.getElementById("orderForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const status = document.getElementById("status");
  status.textContent = "Sending...";

  try {
    const res = await fetch(webhookURL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        content: "TEST ORDER FROM WEBSITE"
      })
    });

    if(res.ok){
      status.textContent = "✅ SENT SUCCESSFULLY";
    } else {
      status.textContent = "❌ FAILED (BAD RESPONSE)";
    }

  } catch (err){
    status.textContent = "❌ ERROR (LIKELY BLOCKED)";
  }
});
</script>

</body>
</html>
