<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<title>Order</title>
</head>
<body>

<nav>
  <h1>Eli's Eggs 🐔</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="shop.html">Eggs</a>
    <a href="gallery.html">Gallery</a>
    <a href="order.html">Order</a>
  </div>
</nav>

<section>
  <h2>Advanced Order System</h2>

  <form id="orderForm" onsubmit="submitOrder(event)">

    <input id="name" placeholder="Name" required>
    <input id="contact" placeholder="Phone Number" required>

    <select id="type" onchange="updateTotal()">
      <option>Dozen</option>
      <option>Half Dozen</option>
    </select>

    <div class="quantity">
      <button type="button" onclick="changeQty(-1)">-</button>
      <input id="quantity" type="number" value="1" onchange="updateTotal()">
      <button type="button" onclick="changeQty(1)">+</button>
    </div>

    <div id="total" class="total">Total: $0.00</div>

    <input id="date" type="date" required>
    <input id="time" type="time" required>

    <textarea id="notes" placeholder="Notes"></textarea>

    <h3>Pickup Location</h3>
    <div id="map"></div>

    <button class="btn">Submit Order</button>
  </form>

  <div id="history" class="history"></div>

</section>

<script src="script.js"></script>
</body>
</html>
