<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<title>Order</title>
</head>
<body>

<nav>
  <h2>Eli's Eggs 🥚</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="shop.html">Eggs</a>
    <a href="order.html">Order</a>
  </div>
</nav>

<section>

  <div class="card">
    <h2>Place Your Order</h2>

    <form id="orderForm" onsubmit="submitOrder(event)">

      <div class="input-group">
        <input id="name" required>
        <label>Name</label>
      </div>

      <div class="input-group">
        <input id="contact" required>
        <label>Phone Number</label>
      </div>

      <div class="input-group">
        <select id="type" onchange="updateTotal()">
          <option>Dozen</option>
          <option>Half Dozen</option>
        </select>
      </div>

      <div class="input-group">
        <input id="quantity" type="number" value="1" onchange="updateTotal()">
        <label>Quantity</label>
      </div>

      <div id="total" class="total">$0.00</div>

      <div class="input-group">
        <input id="date" type="date" required>
      </div>

      <div class="input-group">
        <input id="time" type="time" required>
      </div>

      <div class="input-group">
        <textarea id="notes"></textarea>
        <label>Notes</label>
      </div>

      <h3>Pickup Location</h3>
      <div id="map"></div>

      <button class="btn">Submit Order</button>

      <div id="status" class="status-msg"></div>

    </form>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
